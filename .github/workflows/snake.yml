name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ THIS FIXES YOUR ERROR
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐍 Generate snake
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: YashMehra15
          outputs: github-contribution-grid-snake.svg

      # 📤 Commit snake file
      - name: Push Snake
        uses: EndBug/add-and-commit@v9
        with:
          message: "update snake animation"
          add: "github-contribution-grid-snake.svg"
